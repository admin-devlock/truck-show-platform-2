# Netlify deploy config. The app lives in webapp/; the Next.js runtime plugin is
# REQUIRED — without it Netlify publishes .next as raw static files and every
# route 404s (there's no index.html in a Next server build).
[build]
  base = "webapp"
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"
